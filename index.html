<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Даты">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" href="icon-192.png">
    <title>Калькулятор дат</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 700px;
            width: 100%;
            padding: 30px;
            margin-top: 30px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .mode-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .tab:hover {
            background: #f0f2ff;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .mode-content {
            display: none;
        }
        .mode-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #444;
            font-weight: 500;
        }
        input[type="date"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input[type="date"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .row {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }
        .row .form-group {
            flex: 1;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #5568d3;
        }
        .result {
            margin-top: 20px;
            padding: 18px;
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            font-size: 18px;
            min-height: 60px;
            display: flex;
            align-items: center;
        }
        .result:empty::before {
            content: "Здесь появится результат";
            color: #888;
        }
        .hint {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }
        .today-btn {
            padding: 12px 16px;
            background: #f0f2ff;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }
        .today-btn:hover {
            background: #e0e4ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Калькулятор дат</h1>
        <p class="subtitle">Быстро считайте даты без установки программ</p>

        <div class="mode-tabs">
            <button class="tab active" onclick="switchMode('shift')">Смещение даты</button>
            <button class="tab" onclick="switchMode('diff')">Разница между датами</button>
        </div>

        <!-- Режим 1: смещение даты -->
        <div id="shift" class="mode-content active">
            <div class="form-group">
                <label for="shift-date">Начальная дата</label>
                <div class="row">
                    <input type="date" id="shift-date">
                    <button class="today-btn" onclick="setToday('shift-date')">Сегодня</button>
                </div>
            </div>
            <div class="form-group">
                <label for="shift-days">Количество дней</label>
                <input type="number" id="shift-days" placeholder="Например: 10 или -10">
                <p class="hint">Положительное число — вперед, отрицательное — назад</p>
            </div>
            <button class="btn" onclick="calculateShift()">Посчитать</button>
            <div class="result" id="shift-result"></div>
        </div>

        <!-- Режим 2: разница между датами -->
        <div id="diff" class="mode-content">
            <div class="row">
                <div class="form-group">
                    <label for="diff-date1">Первая дата</label>
                    <div class="row">
                        <input type="date" id="diff-date1">
                        <button class="today-btn" onclick="setToday('diff-date1')">Сегодня</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="diff-date2">Вторая дата</label>
                    <div class="row">
                        <input type="date" id="diff-date2">
                        <button class="today-btn" onclick="setToday('diff-date2')">Сегодня</button>
                    </div>
                </div>
            </div>
            <button class="btn" onclick="calculateDiff()">Посчитать разницу</button>
            <div class="result" id="diff-result"></div>
        </div>
    </div>

    <script>
        function formatDateRu(date) {
            return date.toLocaleDateString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });
        }

        function switchMode(mode) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.mode-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(mode).classList.add('active');
        }

        function setToday(inputId) {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById(inputId).value = `${yyyy}-${mm}-${dd}`;
        }

        function calculateShift() {
            const dateInput = document.getElementById('shift-date').value;
            const daysInput = document.getElementById('shift-days').value;
            const resultEl = document.getElementById('shift-result');

            if (!dateInput) {
                resultEl.textContent = 'Выберите начальную дату';
                return;
            }
            if (daysInput === '' || isNaN(daysInput)) {
                resultEl.textContent = 'Введите корректное количество дней';
                return;
            }

            const startDate = new Date(dateInput);
            const days = parseInt(daysInput, 10);
            const resultDate = new Date(startDate);
            resultDate.setDate(resultDate.getDate() + days);

            const sign = days >= 0 ? '+' : '';
            resultEl.innerHTML = `
                <strong>${formatDateRu(startDate)} ${sign}${days} дн. = ${formatDateRu(resultDate)}</strong>
            `;
        }

        function calculateDiff() {
            const date1Input = document.getElementById('diff-date1').value;
            const date2Input = document.getElementById('diff-date2').value;
            const resultEl = document.getElementById('diff-result');

            if (!date1Input || !date2Input) {
                resultEl.textContent = 'Выберите обе даты';
                return;
            }

            const date1 = new Date(date1Input);
            const date2 = new Date(date2Input);

            // Сбрасываем время для точного подсчета дней
            const d1 = Date.UTC(date1.getFullYear(), date1.getMonth(), date1.getDate());
            const d2 = Date.UTC(date2.getFullYear(), date2.getMonth(), date2.getDate());
            const diffMs = d2 - d1;
            const diffDays = Math.round(diffMs / (1000 * 60 * 60 * 24));

            let direction = '';
            if (diffDays > 0) {
                direction = 'Вторая дата позже первой';
            } else if (diffDays < 0) {
                direction = 'Первая дата позже второй';
            } else {
                direction = 'Даты совпадают';
            }

            resultEl.innerHTML = `
                <strong>Между датами: ${Math.abs(diffDays)} дней</strong><br>
                <span style="color: #666;">${direction}</span>
            `;
        }
    </script>

    <script>
        // Регистрация Service Worker для работы офлайн
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker зарегистрирован'))
                .catch((err) => console.log('Ошибка регистрации Service Worker:', err));
        }
    </script>
</body>
</html>
