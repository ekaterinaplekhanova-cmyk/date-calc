<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Даты">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" href="icon-192.png">
    <title>Калькулятор дат</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e293b;
            --card-bg: #1e293b;
            --card-shadow: 0 20px 60px rgba(0,0,0,0.5);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --accent-light: rgba(56, 189, 248, 0.15);
            --input-bg: #0f172a;
            --input-border: #334155;
            --input-text: #f1f5f9;
            --result-bg: #0f172a;
            --result-border: #38bdf8;
            --theme-btn-bg: #334155;
            --theme-btn-text: #f1f5f9;
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --bg-gradient-start: #f1f5f9;
            --bg-gradient-end: #e2e8f0;
            --card-bg: #ffffff;
            --card-shadow: 0 20px 60px rgba(15, 23, 42, 0.15);
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent: #0ea5e9;
            --accent-hover: #0284c7;
            --accent-light: rgba(14, 165, 233, 0.12);
            --input-bg: #f8fafc;
            --input-border: #cbd5e1;
            --input-text: #0f172a;
            --result-bg: #f0f9ff;
            --result-border: #0ea5e9;
            --theme-btn-bg: #e2e8f0;
            --theme-btn-text: #0f172a;
        }

        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            color: var(--text-primary);
            transition: background 0.3s ease;
        }
        .container {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            max-width: 700px;
            width: 100%;
            padding: 30px;
            margin-top: 30px;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
            gap: 10px;
        }
        .header h1 {
            flex: 1;
            text-align: center;
            color: var(--text-primary);
            margin: 0;
        }
        .theme-toggle {
            background: var(--theme-btn-bg);
            color: var(--theme-btn-text);
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            line-height: 1;
        }
        .theme-toggle:hover {
            transform: scale(1.05);
        }
        h1 {
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
        .mode-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }
        .tab {
            flex: 1;
            min-width: 140px;
            padding: 12px;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--accent);
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .tab:hover {
            background: var(--accent-light);
        }
        .tab.active {
            background: var(--accent);
            color: var(--card-bg);
        }
        .mode-content {
            display: none;
        }
        .mode-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-primary);
            font-weight: 500;
        }
        input[type="date"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--input-border);
            border-radius: 8px;
            font-size: 16px;
            background: var(--input-bg);
            color: var(--input-text);
            transition: border-color 0.2s, background 0.3s, color 0.3s;
        }
        input[type="date"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--accent);
        }
        .row {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }
        .row .form-group {
            flex: 1;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: var(--card-bg);
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: var(--accent-hover);
        }
        .result {
            margin-top: 20px;
            padding: 18px;
            background: var(--result-bg);
            border-left: 4px solid var(--result-border);
            border-radius: 8px;
            font-size: 18px;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            gap: 6px;
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }
        .result:empty::before {
            content: "Здесь появится результат";
            color: var(--text-secondary);
        }
        .result-note {
            color: var(--text-secondary);
        }
        .hint {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .today-btn {
            padding: 12px 16px;
            background: var(--accent-light);
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .today-btn:hover {
            background: var(--accent);
            color: var(--card-bg);
        }

        /* Адаптация под маленькие экраны iPhone */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 20px;
                margin-top: 10px;
                border-radius: 12px;
            }
            .header h1 {
                font-size: 24px;
            }
            .theme-toggle {
                padding: 8px 10px;
                font-size: 18px;
            }
            .tab {
                min-width: 120px;
                padding: 10px;
                font-size: 14px;
            }
            .row {
                flex-direction: column;
                gap: 10px;
                align-items: stretch;
            }
            .today-btn {
                width: 100%;
            }
            .result {
                font-size: 16px;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 Калькулятор дат</h1>
            <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Переключить тему">🌙</button>
        </div>
        <p class="subtitle">Быстро считайте даты без установки программ</p>

        <div class="mode-tabs">
            <button class="tab active" onclick="switchMode('shift')">Смещение даты</button>
            <button class="tab" onclick="switchMode('diff')">Разница между датами</button>
        </div>

        <!-- Режим 1: смещение даты -->
        <div id="shift" class="mode-content active">
            <div class="form-group">
                <label for="shift-date">Начальная дата</label>
                <div class="row">
                    <input type="date" id="shift-date">
                    <button class="today-btn" onclick="setToday('shift-date')">Сегодня</button>
                </div>
            </div>
            <div class="form-group">
                <label for="shift-days">Количество дней</label>
                <input type="number" id="shift-days" placeholder="Например: 10 или -10">
                <p class="hint">Положительное число — вперед, отрицательное — назад</p>
            </div>
            <button class="btn" onclick="calculateShift()">Посчитать</button>
            <div class="result" id="shift-result"></div>
        </div>

        <!-- Режим 2: разница между датами -->
        <div id="diff" class="mode-content">
            <div class="row">
                <div class="form-group">
                    <label for="diff-date1">Первая дата</label>
                    <div class="row">
                        <input type="date" id="diff-date1">
                        <button class="today-btn" onclick="setToday('diff-date1')">Сегодня</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="diff-date2">Вторая дата</label>
                    <div class="row">
                        <input type="date" id="diff-date2">
                        <button class="today-btn" onclick="setToday('diff-date2')">Сегодня</button>
                    </div>
                </div>
            </div>
            <button class="btn" onclick="calculateDiff()">Посчитать разницу</button>
            <div class="result" id="diff-result"></div>
        </div>
    </div>

    <script>
        function formatDateRu(date) {
            return date.toLocaleDateString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });
        }

        function switchMode(mode) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.mode-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(mode).classList.add('active');
        }

        function setToday(inputId) {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById(inputId).value = `${yyyy}-${mm}-${dd}`;
        }

        function calculateShift() {
            const dateInput = document.getElementById('shift-date').value;
            const daysInput = document.getElementById('shift-days').value;
            const resultEl = document.getElementById('shift-result');

            if (!dateInput) {
                resultEl.textContent = 'Выберите начальную дату';
                return;
            }
            if (daysInput === '' || isNaN(daysInput)) {
                resultEl.textContent = 'Введите корректное количество дней';
                return;
            }

            const startDate = new Date(dateInput);
            const days = parseInt(daysInput, 10);
            const resultDate = new Date(startDate);
            resultDate.setDate(resultDate.getDate() + days);

            const sign = days >= 0 ? '+' : '';
            resultEl.innerHTML = `
                <strong>${formatDateRu(startDate)} ${sign}${days} дн. = ${formatDateRu(resultDate)}</strong>
            `;
        }

        function calculateDiff() {
            const date1Input = document.getElementById('diff-date1').value;
            const date2Input = document.getElementById('diff-date2').value;
            const resultEl = document.getElementById('diff-result');

            if (!date1Input || !date2Input) {
                resultEl.textContent = 'Выберите обе даты';
                return;
            }

            const date1 = new Date(date1Input);
            const date2 = new Date(date2Input);

            // Сбрасываем время для точного подсчета дней
            const d1 = Date.UTC(date1.getFullYear(), date1.getMonth(), date1.getDate());
            const d2 = Date.UTC(date2.getFullYear(), date2.getMonth(), date2.getDate());
            const diffMs = d2 - d1;
            const diffDays = Math.round(diffMs / (1000 * 60 * 60 * 24));

            let direction = '';
            if (diffDays > 0) {
                direction = 'Вторая дата позже первой';
            } else if (diffDays < 0) {
                direction = 'Первая дата позже второй';
            } else {
                direction = 'Даты совпадают';
            }

            const absDays = Math.abs(diffDays);
            const ymd = daysToYearsMonthsDays(date1, date2);
            const ymdText = formatYearsMonthsDays(ymd.years, ymd.months, ymd.days);

            resultEl.innerHTML = `
                <div><strong>${formatDateRu(date1)} — ${formatDateRu(date2)}</strong></div>
                <div>Между датами: <strong>${absDays} ${pluralize(absDays, 'день', 'дня', 'дней')}</strong></div>
                <div class="result-note">${ymdText}</div>
                <div class="result-note">${direction}</div>
            `;
        }

        function pluralize(number, one, few, many) {
            const mod10 = number % 10;
            const mod100 = number % 100;
            if (mod10 === 1 && mod100 !== 11) return one;
            if (mod10 >= 2 && mod10 <= 4 && !(mod100 >= 12 && mod100 <= 14)) return few;
            return many;
        }

        function formatYearsMonthsDays(years, months, days) {
            const parts = [];
            if (years !== 0) {
                parts.push(`${years} ${pluralize(Math.abs(years), 'год', 'года', 'лет')}`);
            }
            if (months !== 0) {
                parts.push(`${months} ${pluralize(Math.abs(months), 'месяц', 'месяца', 'месяцев')}`);
            }
            if (days !== 0 || (years === 0 && months === 0)) {
                parts.push(`${days} ${pluralize(Math.abs(days), 'день', 'дня', 'дней')}`);
            }
            return parts.join(', ');
        }

        function daysToYearsMonthsDays(start, end) {
            // Работаем всегда с позитивной разницей, определяем раньше/позже
            let earlier = new Date(start);
            let later = new Date(end);
            let negative = false;

            if (earlier > later) {
                const tmp = earlier;
                earlier = later;
                later = tmp;
                negative = true;
            }

            let years = later.getFullYear() - earlier.getFullYear();
            let months = later.getMonth() - earlier.getMonth();
            let days = later.getDate() - earlier.getDate();

            if (days < 0) {
                // Отнимаем 1 месяц и добавляем количество дней в предыдущем месяце
                months -= 1;
                const prevMonth = new Date(later.getFullYear(), later.getMonth(), 0);
                days += prevMonth.getDate();
            }

            if (months < 0) {
                years -= 1;
                months += 12;
            }

            // Корректировка для февраля: если полученная дата некорректна,
            // сдвигаем дни на последний день месяца
            const checkDate = new Date(
                earlier.getFullYear() + years,
                earlier.getMonth() + months,
                earlier.getDate()
            );
            if (checkDate > later) {
                months -= 1;
                const adjustPrevMonth = new Date(
                    earlier.getFullYear() + years,
                    earlier.getMonth() + months + 1,
                    0
                );
                days = adjustPrevMonth.getDate() - earlier.getDate() + later.getDate();
            }

            return { years, months, days };
        }
    </script>

    <script>
        // Переключение светлой/темной темы
        function updateThemeIcon(theme) {
            const btn = document.getElementById('theme-toggle');
            if (btn) {
                btn.textContent = theme === 'light' ? '☀️' : '🌙';
            }
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateThemeIcon(theme);

            // Обновляем theme-color для iPhone
            const metaTheme = document.querySelector('meta[name="theme-color"]');
            if (metaTheme) {
                metaTheme.content = theme === 'light' ? '#f8fafc' : '#0f172a';
            }
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            const next = current === 'light' ? 'dark' : 'light';
            setTheme(next);
        }

        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved) {
                setTheme(saved);
            } else {
                // Системная тема по умолчанию
                const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
                setTheme(prefersLight ? 'light' : 'dark');
            }
        }

        initTheme();
    </script>

    <script>
        // Регистрация Service Worker для работы офлайн
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker зарегистрирован'))
                .catch((err) => console.log('Ошибка регистрации Service Worker:', err));
        }
    </script>
</body>
</html>
